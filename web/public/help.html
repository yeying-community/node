<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node 帮助文档</title>
    <meta
      name="description"
      content="Node 帮助文档，支持 Markdown、图片、流程图、时序图。"
    />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      :root {
        --theme-color: #1677ff;
      }

      body {
        font-family:
          "PingFang SC",
          "Noto Sans CJK SC",
          "Source Han Sans SC",
          "Microsoft YaHei",
          sans-serif;
      }

      .app-name-link img {
        display: none;
      }

      .sidebar-nav > ul > li > p,
      .sidebar-nav > ul > li > a {
        font-weight: 600;
      }

      .markdown-section {
        max-width: 980px;
      }

      .markdown-section code {
        color: #1356b6;
      }

      .markdown-section pre > code {
        color: inherit;
      }

      .markdown-section img {
        max-width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
      }

      .mermaid {
        overflow-x: auto;
        text-align: center;
        margin: 16px 0;
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "Node 帮助文档",
        repo: "",
        basePath: "/help/",
        homepage: "README.md",
        loadSidebar: "_sidebar.md",
        subMaxLevel: 2,
        auto2top: true,
        relativePath: false,
        maxLevel: 3,
        search: {
          placeholder: "搜索帮助内容",
          noData: "没有找到相关内容",
          depth: 4,
        },
        pagination: {
          previousText: "上一页",
          nextText: "下一页",
          crossChapter: true,
          crossChapterText: true,
        },
        copyCode: {
          buttonText: "复制",
          errorText: "复制失败",
          successText: "已复制",
        },
        plugins: [
          function (hook, vm) {
            hook.beforeEach(function (content) {
              return content;
            });

            hook.afterEach(function (html) {
              return html.replace(
                /<pre v-pre data-lang="mermaid"><code class="lang-mermaid">([\s\S]*?)<\/code><\/pre>/g,
                function (_, code) {
                  const decoded = code
                    .replace(/&lt;/g, "<")
                    .replace(/&gt;/g, ">")
                    .replace(/&amp;/g, "&")
                    .replace(/&#39;/g, "'")
                    .replace(/&quot;/g, '"');
                  return '<div class="mermaid">' + decoded + "</div>";
                }
              );
            });

            hook.doneEach(function () {
              if (!window.mermaid) return;
              const container = document.querySelector("#main");
              if (!container) return;
              const nodes = container.querySelectorAll(".mermaid");
              if (!nodes.length) return;
              window.mermaid
                .run({ nodes: Array.from(nodes) })
                .catch(function (error) {
                  console.error("Mermaid render failed:", error);
                });
            });
          },
        ],
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({
        startOnLoad: false,
        theme: "default",
        securityLevel: "loose",
      });
    </script>
  </body>
</html>
